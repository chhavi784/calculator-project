<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <input type="text" id="result" disabled>
        <div class="button">
            <button  onclick="buttonGlow(this);clearResult()" class="btn-clear">C</button>
            <button onclick="buttonGlow(this);appendValue('()')"class="btn-operator">()</button>
            <button onclick="buttonGlow(this);appendValue('%')" class="btn-operator">%</button>
            <button onclick="buttonGlow(this);appendValue('/')" class="btn-operator">/</button>
            <button onclick="buttonGlow(this);appendValue('7')" class="btn-digit">7</button>
            <button onclick="buttonGlow(this);appendValue('8')" class="btn-digit">8</button>
            <button onclick="buttonGlow(this);appendValue('9')" class="btn-digit">9</button>
            <button onclick="buttonGlow(this);appendValue('')" class="btn-operator"></button>
            <button onclick="buttonGlow(this);appendValue('4')" class="btn-digit">4</button>
            <button onclick="buttonGlow(this);appendValue('5')" class="btn-digit">5</button>
            <button onclick="buttonGlow(this);appendValue('6')" class="btn-digit">6</button>
            <button onclick="buttonGlow(this);appendValue('-')" class="btn-operator">-</button>
            <button onclick="buttonGlow(this);appendValue('1')" class="btn-digit">1</button>
            <button onclick="buttonGlow(this);appendValue('2')" class="btn-digit">2</button>
            <button onclick="buttonGlow(this);appendValue('3')" class="btn-digit">3</button>
            <button onclick="buttonGlow(this);appendValue('+')" class="btn-operator">+</button>
            <button onclick="buttonGlow(this);appendValue('0')" class="btn-digit">0</button>
            <button onclick="buttonGlow(this);appendValue('.')" class="btn-digit">.</button>
            <button onclick="buttonGlow(this);cancelLast()" class="btn-cancel">X</button>
            <button onclick="buttonGlow(this);calculateResult()" class="btn-equals">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
